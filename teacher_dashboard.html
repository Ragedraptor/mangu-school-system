<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - Mang'u High School</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
    }
    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      overflow: hidden;
      margin: 20px;
    }
    .header {
      background: linear-gradient(135deg, #1b263b 0%, #2a3f5f 100%);
      color: white;
      padding: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      padding: 30px;
    }
    .feature-card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      border-left: 4px solid #0077b6;
      cursor: pointer;
    }
    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .feature-icon {
      font-size: 3rem;
      color: #0077b6;
      margin-bottom: 15px;
    }
    .logout-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .logout-btn:hover {
      background: #c82333;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    .form-select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="header">
      <div class="flex items-center space-x-4">
        <img src="mangu_logo.jpg" alt="Logo" class="h-16 w-16 rounded-lg">
        <div>
          <h1 class="text-2xl font-bold">Teacher Dashboard</h1>
          <p class="text-blue-100">Mang'u High School - Limited Access</p>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt mr-2"></i> Logout
      </button>
    </div>

    <div class="feature-grid">
      <div class="feature-card" onclick="window.location.href='roll_call.html'">
        <div class="feature-icon">
          <i class="fas fa-clipboard-check"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2">Roll Call</h3>
        <p class="text-gray-600">Take daily student attendance and mark present/absent students</p>
      </div>

      <div class="feature-card" onclick="window.location.href='flag_student.html'">
        <div class="feature-icon">
          <i class="fas fa-flag"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2">Flag Students</h3>
        <p class="text-gray-600">Report student behavior issues or concerns to administration</p>
      </div>

      <div class="feature-card" onclick="openPrintModal()">
        <div class="feature-icon">
          <i class="fas fa-print"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2">Print Class Lists</h3>
        <p class="text-gray-600">Generate and print class lists for your classes</p>
      </div>
    </div>
  </div>

  <!-- Print Class List Modal -->
  <div id="print-modal" class="modal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Print Class List</h2>
        <button onclick="closePrintModal()" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      
      <form id="print-form">
        <div class="form-group">
          <label class="form-label" for="class-select">
            <i class="fas fa-graduation-cap mr-2"></i>Select Class
          </label>
          <select id="class-select" class="form-select" required onchange="populateStreamOptions()">
            <option value="">-- Select Class --</option>
            <option value="Grade 10">Grade 10</option>
            <option value="Form 3">Form 3</option>
            <option value="Form 4">Form 4</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="stream-select">
            <i class="fas fa-school mr-2"></i>Select Stream
          </label>
          <select id="stream-select" class="form-select" required>
            <option value="">-- Select Stream --</option>
            <!-- Stream options will be populated by JavaScript -->
          </select>
        </div>

        <div class="flex space-x-3 mt-6">
          <button type="button" onclick="generateClassList()" class="bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition flex-1">
            <i class="fas fa-print mr-2"></i> Generate & Print
          </button>
          <button type="button" onclick="closePrintModal()" class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition flex-1">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Streams list
    const streams = [
      "Amherst","Berkley","Cambridge","Cape","Chicago","Columbia","Cornell","Dartmouth","Dayton",
      "Duke","Edinburgh","Harvard","Hopkins","MIT","Michigan","Oxford","Pittsburgh","Princeton",
      "Stanford","Yale","Zurich"
    ].sort();

    // Check authentication
    if (localStorage.getItem('loggedIn') !== 'true' || localStorage.getItem('userRole') !== 'teacher') {
      window.location.href = 'index.html';
    }

    function logout() {
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'index.html';
    }

    function openPrintModal() {
      document.getElementById('print-modal').style.display = 'flex';
      populateStreamOptions();
    }

    function closePrintModal() {
      document.getElementById('print-modal').style.display = 'none';
    }

    function populateStreamOptions() {
      const streamSelect = document.getElementById("stream-select");
      streamSelect.innerHTML = '<option value="">-- Select Stream --</option>';
      streams.forEach(stream => {
        const option = document.createElement("option");
        option.value = stream;
        option.textContent = stream;
        streamSelect.appendChild(option);
      });
    }

    function generateClassList() {
      const selectedClass = document.getElementById("class-select").value;
      const selectedStream = document.getElementById("stream-select").value;
      
      if (!selectedClass || !selectedStream) {
        alert("Please select both class and stream!");
        return;
      }

      const students = JSON.parse(localStorage.getItem("students")) || [];
      const targetClass = `${selectedClass} ${selectedStream}`;
      
      // Filter students for the selected class and stream
      const classStudents = students.filter(student => student.class === targetClass);
      
      if (classStudents.length === 0) {
        alert(`No students found in ${targetClass}!`);
        return;
      }

      // Sort by admission number
      classStudents.sort((a, b) => {
        const aNum = parseInt(a.admissionNo) || a.admissionNo;
        const bNum = parseInt(b.admissionNo) || b.admissionNo;
        return aNum - bNum;
      });

      // Create print window
      const printWindow = window.open('', '_blank', 'width=1000,height=700');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>${targetClass} Class List</title>
          <style>
            body { 
              font-family: Arial, sans-serif; 
              margin: 40px; 
              background: white;
              color: #333;
            }
            .header { 
              text-align: center; 
              margin-bottom: 30px;
              border-bottom: 2px solid #1b263b;
              padding-bottom: 20px;
            }
            .school-name {
              font-size: 24px;
              font-weight: bold;
              color: #1b263b;
              margin-bottom: 10px;
            }
            .class-name {
              font-size: 20px;
              color: #0077b6;
              margin-bottom: 10px;
            }
            .print-date {
              color: #666;
              font-style: italic;
            }
            table {
              width: 100%;
              border-collapse: collapse;
              margin-top: 20px;
            }
            th, td {
              border: 1px solid #ddd;
              padding: 12px;
              text-align: left;
            }
            th {
              background-color: #1b263b;
              color: white;
              font-weight: bold;
            }
            tr:nth-child(even) {
              background-color: #f8f9fa;
            }
            .summary {
              margin-top: 30px;
              padding: 15px;
              background: #f8f9fa;
              border-radius: 8px;
            }
            @media print {
              body { margin: 20px; }
              .header { border-bottom: 2px solid #000; }
            }
          </style>
        </head>
        <body>
          <div class="header">
            <div class="school-name">Mang'u High School</div>
            <div class="class-name">${targetClass} - Class List</div>
            <div class="print-date">Generated on: ${new Date().toLocaleDateString()}</div>
          </div>
          
          <table>
            <thead>
              <tr>
                <th width="8%">#</th>
                <th width="25%">Admission No.</th>
                <th width="47%">Student Name</th>
                <th width="20%">Status</th>
              </tr>
            </thead>
            <tbody>
              ${classStudents.map((student, index) => `
                <tr>
                  <td>${index + 1}</td>
                  <td>${student.admissionNo}</td>
                  <td>${student.name}</td>
                  <td>${student.status || 'Normal'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          
          <div class="summary">
            <strong>Total Students:</strong> ${classStudents.length}
          </div>
        </body>
        </html>
      `);
      
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
      
      // Close modal after printing
      closePrintModal();
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('print-modal');
      if (event.target === modal) {
        closePrintModal();
      }
    }
  </script>
</body>
</html>
