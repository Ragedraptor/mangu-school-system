<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leave Reports - Mang'u High School</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #1b263b;
      --primary-dark: #14213d;
      --secondary: #4CAF50;
      --accent: #0077b6;
      --success: #4CAF50;
      --warning: #ff9800;
      --danger: #e63946;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --border: #dee2e6;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: var(--dark);
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      color: var(--primary);
      font-weight: 700;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 i {
      color: var(--secondary);
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
      border-left: 4px solid var(--accent);
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-card.total {
      border-left-color: var(--primary);
    }

    .stat-card.pending {
      border-left-color: var(--warning);
    }

    .stat-card.approved {
      border-left-color: var(--success);
    }

    .stat-card.rejected {
      border-left-color: var(--danger);
    }

    .stat-card h3 {
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 14px;
      color: var(--gray);
      text-transform: uppercase;
    }

    .stat-card p {
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .btn-secondary {
      background-color: var(--accent);
    }

    .btn-secondary:hover {
      background-color: #005b8a;
    }

    .btn-print {
      background-color: var(--success);
    }

    .btn-print:hover {
      background-color: #3d8b40;
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      background: var(--light);
      padding: 20px;
      border-radius: var(--radius);
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 180px;
    }

    .filter-label {
      font-weight: 600;
      font-size: 14px;
      color: var(--dark);
    }

    .filter-select, .filter-input {
      padding: 10px 15px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background-color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border);
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: var(--primary);
      color: white;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    tr {
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s;
    }

    tr:last-child {
      border-bottom: none;
    }

    tr:nth-child(even) {
      background-color: #f8f9fa;
    }

    tr:hover {
      background-color: #e8f4fc;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .delete-btn {
      background-color: var(--danger);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background-color: #c82333;
      transform: scale(1.05);
    }

    .view-btn {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      text-decoration: none;
    }

    .view-btn:hover {
      background-color: #005b8a;
      transform: scale(1.05);
    }

    .status-btn {
      background-color: var(--warning);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      flex: 1;
    }

    .status-btn.approve {
      background-color: var(--success);
    }

    .status-btn.approve:hover {
      background-color: #3d8b40;
      transform: translateY(-2px);
    }

    .status-btn.reject {
      background-color: var(--danger);
    }

    .status-btn.reject:hover {
      background-color: #c82333;
      transform: translateY(-2px);
    }

    .status-btn.pending {
      background-color: var(--warning);
    }

    .status-btn.pending:hover {
      background-color: #e0a800;
      transform: translateY(-2px);
    }

    .no-reports {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
      background-color: var(--light);
      border-radius: var(--radius);
      margin: 20px 0;
    }

    .no-reports i {
      font-size: 64px;
      margin-bottom: 20px;
      color: #adb5bd;
    }

    .no-reports h3 {
      font-size: 24px;
      margin-bottom: 10px;
      color: var(--dark);
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending {
      background-color: #fff3cd;
      color: #856404;
    }

    .status-approved {
      background-color: #d4edda;
      color: #155724;
    }

    .status-rejected {
      background-color: #f8d7da;
      color: #721c24;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius);
      padding: 30px;
      max-width: 700px;
      width: 90%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary);
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--gray);
    }

    .modal-body {
      line-height: 1.6;
    }

    .detail-row {
      display: flex;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .detail-label {
      font-weight: 600;
      width: 150px;
      color: var(--dark);
    }

    .detail-value {
      flex: 1;
      color: var(--gray);
    }

    .status-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .current-status {
      text-align: center;
      margin: 20px 0;
      padding: 15px;
      background: var(--light);
      border-radius: var(--radius);
      border-left: 4px solid var(--warning);
    }

    .current-status.approved {
      border-left-color: var(--success);
    }

    .current-status.rejected {
      border-left-color: var(--danger);
    }

    .status-title {
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--dark);
    }

    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }
      
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      
      .buttons {
        flex-direction: column;
      }
      
      .btn {
        justify-content: center;
      }
      
      table {
        display: block;
        overflow-x: auto;
      }
      
      .filters {
        flex-direction: column;
      }
      
      .action-buttons {
        flex-direction: column;
      }

      .status-actions {
        flex-direction: column;
      }

      .detail-row {
        flex-direction: column;
        gap: 5px;
      }

      .detail-label {
        width: 100%;
      }
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }
      
      .container {
        box-shadow: none;
        padding: 10px;
      }
      
      .buttons, .filters, .action-buttons {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-file-alt"></i> Leave Reports - Mang'u High School</h1>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-container">
      <div class="stat-card total" onclick="filterByStatus('all')">
        <h3>Total Applications</h3>
        <p id="total-count">0</p>
      </div>
      <div class="stat-card pending" onclick="filterByStatus('pending')">
        <h3>Pending</h3>
        <p id="pending-count">0</p>
      </div>
      <div class="stat-card approved" onclick="filterByStatus('approved')">
        <h3>Approved</h3>
        <p id="approved-count">0</p>
      </div>
      <div class="stat-card rejected" onclick="filterByStatus('rejected')">
        <h3>Rejected</h3>
        <p id="rejected-count">0</p>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" onclick="window.location.href='dashboard.html'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='leave_out_form.html'">
        <i class="fas fa-plus"></i> New Leave Request
      </button>
      <button class="btn btn-print" onclick="window.print()">
        <i class="fas fa-print"></i> Print Report
      </button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label class="filter-label" for="search-input">
          <i class="fas fa-search"></i> Search
        </label>
        <input type="text" id="search-input" class="filter-input" placeholder="Search by name or admission no..." onkeyup="filterTable()">
      </div>
      
      <div class="filter-group">
        <label class="filter-label" for="type-filter">
          <i class="fas fa-filter"></i> Leave Type
        </label>
        <select class="filter-select" id="type-filter" onchange="filterTable()">
          <option value="all">All Types</option>
          <option value="Medical">Medical</option>
          <option value="Personal">Personal</option>
          <option value="Suspension">Suspension</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label class="filter-label" for="status-filter">
          <i class="fas fa-tag"></i> Status
        </label>
        <select class="filter-select" id="status-filter" onchange="filterTable()">
          <option value="all">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" for="class-filter">
          <i class="fas fa-graduation-cap"></i> Class
        </label>
        <select class="filter-select" id="class-filter" onchange="filterTable()">
          <option value="all">All Classes</option>
          <option value="Form 1">Form 1</option>
          <option value="Form 2">Form 2</option>
          <option value="Form 3">Form 3</option>
          <option value="Form 4">Form 4</option>
        </select>
      </div>
    </div>

    <!-- Reports Table -->
    <table id="reports-table">
      <thead>
        <tr>
          <th>Admission No</th>
          <th>Student Name</th>
          <th>Class</th>
          <th>Leave Type</th>
          <th>Start Date</th>
          <th>End Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- JS will fill rows -->
      </tbody>
    </table>

    <div class="no-reports" id="no-reports-msg" style="display:none;">
      <i class="fas fa-inbox"></i>
      <h3>No Leave Reports Found</h3>
      <p>There are no submitted leave applications to display.</p>
      <button class="btn" onclick="window.location.href='leave_out_form.html'" style="margin-top: 20px;">
        <i class="fas fa-plus"></i> Create New Leave Request
      </button>
    </div>
  </div>

  <!-- View Details Modal -->
  <div id="details-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Leave Request Details</h3>
        <button class="close-modal" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Details will be inserted here -->
      </div>
      <div class="status-actions" id="status-actions">
        <!-- Status action buttons will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    let allLeaves = [];
    let currentLeaveIndex = -1;

    function loadReports() {
      allLeaves = JSON.parse(localStorage.getItem("leaves")) || [];
      const tbody = document.querySelector("#reports-table tbody");
      const noReportsMsg = document.getElementById("no-reports-msg");
      const table = document.getElementById("reports-table");

      tbody.innerHTML = ""; // Clear old rows

      if (allLeaves.length === 0) {
        noReportsMsg.style.display = "block";
        table.style.display = "none";
        updateStatistics(allLeaves);
        return;
      }

      noReportsMsg.style.display = "none";
      table.style.display = "table";

      // Sort by most recent submission
      allLeaves.sort((a, b) => new Date(b.dateSubmitted) - new Date(a.dateSubmitted));

      allLeaves.forEach((leave, index) => {
        const tr = document.createElement("tr");
        
        // Use actual status if available, otherwise default to pending
        const status = leave.status || "pending";
        
        tr.innerHTML = `
          <td>${leave.admissionNo}</td>
          <td>${leave.name}</td>
          <td>${leave.class}</td>
          <td>${leave.leaveType}</td>
          <td>${formatDate(leave.startDate)}</td>
          <td>${formatDate(leave.endDate)}</td>
          <td><span class="status-badge status-${status}">${status}</span></td>
          <td>
            <div class="action-buttons">
              <button class="view-btn" onclick="viewDetails(${index})">
                <i class="fas fa-eye"></i> View & Manage
              </button>
              <button class="delete-btn" onclick="openDeleteModal(${index})">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });

      updateStatistics(allLeaves);
      filterTable(); // Apply any existing filters
    }

    function updateStatistics(leaves) {
      document.getElementById("total-count").textContent = leaves.length;
      document.getElementById("pending-count").textContent = leaves.filter(l => 
        (l.status || "pending") === "pending").length;
      document.getElementById("approved-count").textContent = leaves.filter(l => 
        (l.status || "approved") === "approved").length;
      document.getElementById("rejected-count").textContent = leaves.filter(l => 
        (l.status || "rejected") === "rejected").length;
    }

    function formatDate(dateString) {
      if (!dateString) return "N/A";
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function viewDetails(index) {
      currentLeaveIndex = index;
      const leave = allLeaves[index];
      const modalBody = document.getElementById("modal-body");
      const statusActions = document.getElementById("status-actions");
      
      const status = leave.status || "pending";
      const statusColor = status === "approved" ? "status-approved" : 
                         status === "rejected" ? "status-rejected" : "status-pending";
      
      modalBody.innerHTML = `
        <div class="current-status ${status}">
          <div class="status-title">Current Status</div>
          <span class="status-badge ${statusColor}">${status.toUpperCase()}</span>
        </div>
        
        <div class="detail-row">
          <div class="detail-label">Admission No:</div>
          <div class="detail-value">${leave.admissionNo}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Student Name:</div>
          <div class="detail-value">${leave.name}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Class:</div>
          <div class="detail-value">${leave.class}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Contact:</div>
          <div class="detail-value">${leave.contact || "N/A"}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Leave Type:</div>
          <div class="detail-value">${leave.leaveType}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Duration:</div>
          <div class="detail-value">${formatDate(leave.startDate)} to ${formatDate(leave.endDate)}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Reason:</div>
          <div class="detail-value">${leave.reason}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Submitted On:</div>
          <div class="detail-value">${new Date(leave.dateSubmitted).toLocaleString()}</div>
        </div>
        ${leave.statusUpdated ? `
        <div class="detail-row">
          <div class="detail-label">Status Updated:</div>
          <div class="detail-value">${new Date(leave.statusUpdated).toLocaleString()}</div>
        </div>
        ` : ''}
      `;
      
      // Add status action buttons to modal
      statusActions.innerHTML = `
        <button class="status-btn approve" onclick="updateStatus('approved')">
          <i class="fas fa-check-circle"></i> Approve Leave
        </button>
        <button class="status-btn reject" onclick="updateStatus('rejected')">
          <i class="fas fa-times-circle"></i> Reject Leave
        </button>
        <button class="status-btn pending" onclick="updateStatus('pending')">
          <i class="fas fa-clock"></i> Set as Pending
        </button>
        ${leave.status === "approved" ? `
        <button class="status-btn" style="background-color: #6c757d;" onclick="markAsReturned(${index})">
          <i class="fas fa-undo"></i> Mark as Returned
        </button>
        ` : ''}
      `;
      
      document.getElementById("details-modal").style.display = "flex";
    }

    function updateStatus(newStatus) {
      if (currentLeaveIndex >= 0 && currentLeaveIndex < allLeaves.length) {
        const leave = allLeaves[currentLeaveIndex];
        const students = JSON.parse(localStorage.getItem("students")) || [];
        const studentIndex = students.findIndex(s => s.admissionNo === leave.admissionNo);
        
        leave.status = newStatus;
        leave.statusUpdated = new Date().toISOString();
        
        // Save leave status
        localStorage.setItem("leaves", JSON.stringify(allLeaves));
        
        if (studentIndex !== -1) {
          if (newStatus === "pending") {
            // WHEN LEAVE IS PENDING: Set status based on leave type
            let newStudentStatus = "Normal"; // Default fallback
            
            if (leave.leaveType === "Medical") {
              newStudentStatus = "Sick";
            } else if (leave.leaveType === "Suspension") {
              newStudentStatus = "Suspended";
            } else if (leave.leaveType === "Personal") {
              newStudentStatus = "Home";
            }
            
            // Update student status to show they're away
            students[studentIndex].status = newStudentStatus;
            students[studentIndex].lastUpdated = new Date().toISOString().split('T')[0];
            
            alert(`Leave request for ${leave.name} set to PENDING - Student status updated to: ${newStudentStatus}`);
            
          } else if (newStatus === "approved") {
            // WHEN LEAVE IS APPROVED: Student returns to school, set status to Normal
            students[studentIndex].status = "Normal";
            students[studentIndex].lastUpdated = new Date().toISOString().split('T')[0];
            alert(`Leave request for ${leave.name} APPROVED - Student has returned to school, status set to Normal`);
            
          } else if (newStatus === "rejected") {
            // When leave is rejected, student remains in current status (no change)
            alert(`Leave request for ${leave.name} REJECTED - Student status unchanged`);
          }
          
          // Save updated student data
          localStorage.setItem("students", JSON.stringify(students));
        } else {
          alert("Error: Student record not found in database!");
        }
        
        // Reload the table
        loadReports();
        
        // Close modal
        closeModal();
      }
    }

    function markAsReturned(index) {
      const leave = allLeaves[index];
      const students = JSON.parse(localStorage.getItem("students")) || [];
      const studentIndex = students.findIndex(s => s.admissionNo === leave.admissionNo);
      
      if (studentIndex !== -1) {
        // Set student status back to Normal
        students[studentIndex].status = "Normal";
        students[studentIndex].lastUpdated = new Date().toISOString().split('T')[0];
        
        // Optionally, you can also set the leave status to something else
        // leave.status = "completed";
        
        localStorage.setItem("students", JSON.stringify(students));
        alert(`Student ${leave.name} marked as returned - Status set to Normal`);
        
        // Reload data
        loadReports();
        closeModal();
      } else {
        alert("Error: Student record not found!");
      }
    }

    function closeModal() {
      document.getElementById("details-modal").style.display = "none";
      currentLeaveIndex = -1;
    }

    function openDeleteModal(index) {
      const leave = allLeaves[index];
      const confirmDelete = confirm(`Are you sure you want to delete the leave request for ${leave.name} (${leave.admissionNo})?`);
      if (confirmDelete) {
        allLeaves.splice(index, 1);
        localStorage.setItem("leaves", JSON.stringify(allLeaves));
        loadReports();
      }
    }

    function filterTable() {
      const searchValue = document.getElementById("search-input").value.toLowerCase();
      const typeFilter = document.getElementById("type-filter").value;
      const statusFilter = document.getElementById("status-filter").value;
      const classFilter = document.getElementById("class-filter").value;
      
      const rows = document.querySelectorAll("#reports-table tbody tr");
      let visibleCount = 0;
      
      rows.forEach(row => {
        const admissionNo = row.cells[0].textContent.toLowerCase();
        const name = row.cells[1].textContent.toLowerCase();
        const studentClass = row.cells[2].textContent;
        const type = row.cells[3].textContent;
        const status = row.cells[6].querySelector(".status-badge").textContent;
        
        const searchMatch = searchValue === "" || 
                           admissionNo.includes(searchValue) || 
                           name.includes(searchValue);
        const typeMatch = typeFilter === "all" || type === typeFilter;
        const statusMatch = statusFilter === "all" || status === statusFilter;
        const classMatch = classFilter === "all" || studentClass.includes(classFilter);
        
        const shouldShow = searchMatch && typeMatch && statusMatch && classMatch;
        row.style.display = shouldShow ? "" : "none";
        
        if (shouldShow) visibleCount++;
      });

      // Show/hide no results message
      const noReportsMsg = document.getElementById("no-reports-msg");
      if (visibleCount === 0 && allLeaves.length > 0) {
        noReportsMsg.innerHTML = `
          <i class="fas fa-search"></i>
          <h3>No Matching Results</h3>
          <p>No leave applications match your current filters.</p>
          <button class="btn" onclick="clearFilters()" style="margin-top: 20px;">
            <i class="fas fa-times"></i> Clear Filters
          </button>
        `;
        noReportsMsg.style.display = "block";
      } else if (visibleCount === 0) {
        noReportsMsg.style.display = "block";
      } else {
        noReportsMsg.style.display = "none";
      }
    }

    function filterByStatus(status) {
      document.getElementById("status-filter").value = status;
      filterTable();
    }

    function clearFilters() {
      document.getElementById("search-input").value = "";
      document.getElementById("type-filter").value = "all";
      document.getElementById("status-filter").value = "all";
      document.getElementById("class-filter").value = "all";
      filterTable();
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById("details-modal");
      if (event.target === modal) {
        closeModal();
      }
    }

    window.addEventListener('DOMContentLoaded', loadReports);
  </script>
</body>
</html>
